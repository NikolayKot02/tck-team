<!DOCTYPE html>
<html>
<head>
    <title>TCK-team</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- ПОДКЛЮЧАЕМ ФАЙЛ С ПЕРЕВОДАМИ -->
    <script src="lang.js"></script>

    <style>
        body { font-family: 'Roboto', sans-serif; padding: 20px; }
        .lang-switch { margin-bottom: 20px; }
        button { cursor: pointer; padding: 8px 15px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ru')">RU</button>
    </div>

    <!-- Добавляем data-key, чтобы скрипт знал, какой текст подставлять -->
    <h1 id="title" data-key="title">It's website tck-team in cs</h1>
    <p id="description" data-key="description">Welcome to our team page!</p>
    
    <img src="Cs.jpeg" alt="Cs" width="900">

    <div class="links">
        <p id="useful-links" data-key="usefulLinks">Useful links:</p>
        <ul>
            <li><a href="#">Steam</a></li>
        </ul>
        <p id="team-info" data-key="teamMembers">Team roster...</p>
    </div>
    
    <script>
        function changeLang(lang) {
            // Ищем все элементы, у которых есть атрибут data-key
            const elements = document.querySelectorAll('[data-key]');
            
            elements.forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            document.documentElement.lang = lang;
            localStorage.setItem('preferredLang', lang); // Запоминаем выбор
        }

        window.onload = function() {
            // Сначала проверяем, сохранял ли пользователь язык раньше
            let savedLang = localStorage.getItem('preferredLang');
            
            if (!savedLang) {
                // Если нет — определяем по браузерu
                savedLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
            }
            
            changeLang(savedLang);
        };
    </script>
</body>
</html>
